name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download MediaPipe model
        run: |
          mkdir -p app/src/main/assets/models
          curl -L -o app/src/main/assets/models/pose_landmarker_heavy.task \
            "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_heavy/float16/latest/pose_landmarker_heavy.task"

      - name: Create placeholder clothing assets
        run: |
          python3 -c "
          import struct, zlib, os

          def create_placeholder_png(width, height, r, g, b, filepath):
              def make_png(w, h, pixels):
                  def chunk(ct, data):
                      c = ct + data
                      return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
                  hdr = b'\x89PNG\r\n\x1a\n'
                  ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 6, 0, 0, 0))
                  raw = b''
                  for y in range(h):
                      raw += b'\x00'
                      for x in range(w):
                          raw += bytes([pixels[y][x][0], pixels[y][x][1], pixels[y][x][2], pixels[y][x][3]])
                  idat = chunk(b'IDAT', zlib.compress(raw))
                  iend = chunk(b'IEND', b'')
                  return hdr + ihdr + idat + iend
              pixels = [[(r, g, b, 200)] * width for _ in range(height)]
              os.makedirs(os.path.dirname(filepath), exist_ok=True)
              with open(filepath, 'wb') as f:
                  f.write(make_png(width, height, pixels))

          tops = 'app/src/main/assets/clothing/tops'
          pants = 'app/src/main/assets/clothing/pants'
          create_placeholder_png(512, 600, 70, 130, 180, f'{tops}/tshirt_blue.png')
          create_placeholder_png(512, 700, 40, 40, 40, f'{tops}/jacket_black.png')
          create_placeholder_png(512, 650, 240, 240, 240, f'{tops}/shirt_white.png')
          create_placeholder_png(512, 800, 70, 100, 160, f'{pants}/jeans_blue.png')
          create_placeholder_png(512, 800, 30, 30, 30, f'{pants}/pants_black.png')
          create_placeholder_png(512, 800, 140, 140, 140, f'{pants}/sweatpants_gray.png')
          "

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk

      - name: List build outputs
        run: find app/build/outputs -name "*.apk" -type f
